# Production stack for EZserver (Portainer + Nginx Proxy Manager).
# Single container serves both the Next.js UI and the Socket.IO server on port 3000.
# No host port is published — NPM routes traffic to the container over the proxy-network.
services:
  ezyimposter:
    image: ghcr.io/atifalin/imposter:latest
    container_name: ezyimposter
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      # Persistent SQLite DB — survives restarts and auto-updates
      - ezyimposter_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Leave blank to auto-detect from the request origin (works behind any domain)
      - NEXT_PUBLIC_APP_URL=
      - NEXT_PUBLIC_SOCKET_URL=
      - ADMIN_PASSWORD=admin123
      - DATABASE_URL=file:/app/data/prod.db
    networks:
      - proxy-network
    labels:
      # Only containers with this label are auto-updated by the scoped Watchtower below
      - "com.centurylinklabs.watchtower.enable=true"

  # Watches ONLY the labelled ezyimposter container; pulls new images every 60s and restarts.
  # Uses the actively-maintained fork (containrrr/watchtower is abandoned and too old
  # for modern Docker API >= 1.44, which the server's Docker v29 requires).
  ezyimposter-watchtower:
    image: ghcr.io/nicholas-fedor/watchtower:latest
    container_name: ezyimposter-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 60 --label-enable --cleanup

volumes:
  ezyimposter_data:
    name: ezyimposter_data

networks:
  proxy-network:
    external: true
    name: proxy-network
